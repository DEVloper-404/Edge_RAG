name: CMake Build CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Download your repository WITH the llama.cpp submodule files included
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake

    # 2. Configure using modern CMake patterns
    - name: Configure CMake
      run: cmake -B build -S .

    # 3. Build using all available CPU threads
    - name: Build Project
      run: cmake --build build --parallel $(nproc)
